<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campeonato de Torcidas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🏆 Campeonato de Torcidas</h1>
        <div id="countdown-box">
            Fim da rodada em: <span id="timer-semanal">--d --h --m --s</span>
        </div>
    </header>

    <div class="painel-info">
        <section id="ranking-geral-container">
            <h2>📊 Ranking Geral (Líderes)</h2>
            <div id="lista-ranking-geral"></div>
        </section>

        <section id="historico-container">
            <h2>📅 Últimos Campeões</h2>
            <div id="lista-historico">
                <p>O histórico é atualizado toda segunda-feira.</p>
            </div>
        </section>
    </div>

    <main>
        <h2>🗳️ Votos da Semana</h2>
        <div id="lista-times" class="grid-times">
            <p>Carregando times...</p>
        </div>
    </main>

    <div id="video-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>🎬 Validando Voto...</h3>
            <p>Assista para confirmar: <span id="video-timer">15</span>s</p>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
