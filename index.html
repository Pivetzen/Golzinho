<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golzinho Realtime - Arena</title>
    
    <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js"></script>
    
    <style>
        :root {
            --primary-color: #2b8a3e;
            --stadium-green: #1e522a;
            --gold: #fcc419;
            --dark-card: #1a1a1a;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, var(--stadium-green) 0%, #0d2614 100%); 
            color: #fff;
            padding: 15px; 
            margin: 0;
            min-height: 100vh;
        }

        .stadium-wrapper {
            max-width: 550px; 
            margin: 20px auto; 
            background: rgba(26, 26, 26, 0.95); 
            padding: 25px; 
            border-radius: 20px; 
            border: 3px solid #343a40;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
        }

        h1 { font-size: 26px; color: var(--gold); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { font-size: 13px; color: #adb5bd; margin-bottom: 25px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #ced4da; display: block; margin-bottom: 5px; }
        
        select { 
            width: 100%; padding: 14px; font-size: 15px; font-weight: 600;
            background: #2b2b2b; color: #fff; border: 2px solid #495057; border-radius: 8px;
            cursor: pointer; transition: all 0.3s;
        }
        select:focus { border-color: var(--primary-color); outline: none; }

        /* Filtros de Regiões */
        .filter-container { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 15px; }
        .filter-btn { 
            flex: 1; padding: 8px 3px; font-size: 11px; font-weight: bold; background: #343a40; 
            border: 1px solid #495057; border-radius: 5px; color: #fff; cursor: pointer; text-transform: uppercase;
        }
        .filter-btn.active { background: var(--primary-color); border-color: #51cf66; }

        /* Botão Chutar Principal */
        .btn-kick { 
            width: 100%; padding: 18px; font-size: 20px; font-weight: 800; 
            background: linear-gradient(to bottom, #40c057 0%, #2b8a3e 100%);
            color: white; border: none; border-radius: 12px; cursor: pointer; 
            text-transform: uppercase; box-shadow: 0 5px 0 #1e5a29; transition: all 0.1s;
        }
        .btn-kick:active { transform: translateY(3px); box-shadow: 0 2px 0 #1e5a29; }
        .btn-kick:disabled { background: #495057; box-shadow: none; cursor: not-allowed; opacity: 0.6; }

        /* Placar Gamificado */
        .scoreboard { 
            margin-top: 30px; background: #000; border: 4px solid #343a40; 
            border-radius: 12px; padding: 15px; text-align: left; font-family: 'Courier New', Courier, monospace;
        }
        .scoreboard h3 { margin-top: 0; color: var(--gold); border-bottom: 1px dashed #343a40; padding-bottom: 8px; font-size: 16px; }
        
        .row-team { 
            display: flex; justify-content: space-between; padding: 10px 5px; 
            border-bottom: 1px solid #1a1a1a; align-items: center; font-size: 15px;
        }
        .row-team:last-child { border: none; }
        .team-meta { display: flex; align-items: center; }
        .emblem { font-size: 22px; margin-right: 12px; display: inline-block; width: 30px; text-align: center; }
        .emblem img { width: 30px; height: 30px; object-fit: contain; }
        .state-badge { background: #343a40; font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-left: 8px; color: #ced4da; }
        .goals-counter { color: #51cf66; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="stadium-wrapper">
    <h1>🏟️ Arena Golzinho</h1>
    <div class="subtitle">Escolha seu clube e marque gols assistindo à rodada!</div>
    
    <div class="form-group">
        <label>Selecione o Time:</label>
        <select id="selectTime">
            <option value="">Carregando clubes parceiros...</option>
        </select>
    </div>

    <button class="btn-kick" id="btnGol" disabled>⚽ Chutar pro Gol! (Ad)</button>

    <div class="scoreboard">
        <h3>🏆 RANKING NACIONAL GERAL</h3>
        
        <label style="margin-bottom: 8px;">Filtrar Placar por Região:</label>
        <div class="filter-container">
            <button class="filter-btn active" onclick="filtrarRegiao('todos')">Todos</button>
            <button class="filter-btn" onclick="filtrarRegiao('nordeste')">NE</button>
            <button class="filter-btn" onclick="filtrarRegiao('sudeste')">SE</button>
            <button class="filter-btn" onclick="filtrarRegiao('sul')">SUL</button>
            <button class="filter-btn" onclick="filtrarRegiao('centro-oeste')">CO</button>
            <button class="filter-btn" onclick="filtrarRegiao('norte')">NO</button>
        </div>

        <div id="dadosPlacar">Aguardando sinal dos estádios...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // INSIRA O URL DO SEU GOOGLE APPS SCRIPT AQUI
    const URL_PLANILHA_API = "https://script.google.com/macros/s/AKfycbxMpYkz_6GhN02m2XqlQheQM3UbuoM7Qfuz5I-IIDELqsyE7fWgx47cCvkcyB-0s_RzRA/exec";

    const firebaseConfig = {
        apiKey: "AIzaSyBOmB90lBIwHCZMaUIMrqWXQb_bj5VrKyE",
        authDomain: "golzinho-410ab.firebaseapp.com",
        databaseURL: "https://golzinho-410ab-default-rtdb.firebaseio.com",
        projectId: "golzinho-410ab",
        storageBucket: "golzinho-410ab.firebasestorage.app",
        messagingSenderId: "685138662724",
        appId: "1:685138662724:web:760dabe9dc52fed8c1b311"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const btnGol = document.getElementById('btnGol');
    const selectTime = document.getElementById('selectTime');
    const dadosPlacar = document.getElementById('dadosPlacar');

    let dbDataCache = {}; 
    let mapaTimes = {}; 
    let regiaoAtual = 'todos';

    // ==========================================
    // 🎛️ CONFIGURAÇÃO DE ADS REAIS (GOOGLE GPT)
    // ==========================================
    let rewardedSlot;
    let recompensaConcedida = false;

    window.googletag = window.googletag || { cmd: [] };
    
    googletag.cmd.push(() => {
        // Substitua pelo seu ID de Bloco de Anúncio Premiado do Google Ad Manager / AdSense posterior
        rewardedSlot = googletag.defineOutOfPageSlot(
            '/6355419/txt_rewarded_ad_unit_id', 
            googletag.enums.OutOfPageFormat.REWARDED
        );

        if (rewardedSlot) {
            rewardedSlot.addService(googletag.pubads());
            
            // Ouvir quando o usuário ganha o prêmio por assistir tudo
            googletag.pubads().addEventListener('rewardedSlotGranted', (event) => {
                recompensaConcedida = true;
            });

            // Ouvir quando o anúncio fecha
            googletag.pubads().addEventListener('rewardedSlotClosed', (event) => {
                processarFechamentoAd();
            });

            googletag.enableServices();
        }
    });

    // ==========================================
    // 📊 INTEGRAÇÃO DO GOOGLE SHEETS
    // ==========================================
    async function carregarDadosDosTimes() {
        try {
            const response = await fetch(URL_PLANILHA_API);
            const times = await response.json();
            
            selectTime.innerHTML = '<option value="">-- Selecione seu Clube --</option>';
            
            times.forEach(t => {
                mapaTimes[t.nome] = t; // Cache do objeto do time completo
                
                const option = document.createElement('option');
                option.value = t.nome;
                option.textContent = `${t.emblema} ${t.nome} (${t.estado})`;
                selectTime.appendChild(option);
            });

            btnGol.disabled = false;
            ouvirPlacarRealtime(); // Só abre o realtime depois de mapear os times
        } catch (error) {
            console.error("Erro ao sincronizar com o Sheets:", error);
            dadosPlacar.innerText = "Erro ao sincronizar dados da liga.";
        }
    }

    function exibirEmblema(emblema) {
        if (!emblema) return '⚽';
        if (emblema.startsWith('http')) return `<img src="${emblema}" alt="Escudo">`;
        return `<span>${emblema}</span>`;
    }

    // ==========================================
    // 🔄 FILTROS & BANCO DE DADOS REALTIME
    // ==========================================
    function ouvirPlacarRealtime() {
        const timesRef = ref(db, 'times');
        onValue(timesRef, (snapshot) => {
            dbDataCache = snapshot.val() || {};
            renderizarPlacar();
        });
    }

    function renderizarPlacar() {
        dadosPlacar.innerHTML = '';
        const timesFiltrados = Object.keys(dbDataCache).filter(nomeTime => {
            const infoSheets = mapaTimes[nomeTime];
            if (!infoSheets) return false;
            if (regiaoAtual === 'todos') return true;
            return infoSheets.regiao === regiaoAtual;
        });

        if (timesFiltrados.length === 0) {
            dadosPlacar.innerHTML = '<div style="color:#666; padding:10px;">Nenhum gol registrado nesta região.</div>';
            return;
        }

        timesFiltrados
            .sort((a, b) => dbDataCache[b].gols - dbDataCache[a].gols)
            .forEach(nomeTime => {
                const info = mapaTimes[nomeTime];
                dadosPlacar.innerHTML += `
                    <div class="row-team">
                        <div class="team-meta">
                            <div class="emblem">${exibirEmblema(info.emblema)}</div>
                            <strong>${info.nome}</strong>
                            <span class="state-badge">${info.estado.toUpperCase()}</span>
                        </div>
                        <span class="goals-counter">${dbDataCache[nomeTime].gols} GOLS</span>
                    </div>
                `;
            });
    }

    window.filtrarRegiao = function(regiao) {
        regiaoAtual = regiao;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderizarPlacar();
    };

    // ==========================================
    // 🎬 LOGICA DE CHUTE E DISPARO DE AD
    // ==========================================
    btnGol.addEventListener('click', () => {
        const timeSelecionado = selectTime.value;
        if (!timeSelecionado) {
            alert("Selecione um time para chutar!");
            return;
        }

        btnGol.disabled = true;
        btnGol.innerText = "⚡ Preparando Chute...";
        recompensaConcedida = false;

        // Dispara o anúncio oficial do Google GPT se carregado, senão cai na simulação de teste
        if (window.googletag && googletag.pubadsReady) {
            googletag.cmd.push(() => { googletag.display(rewardedSlot); });
        } else {
            // Fallback de desenvolvimento local
            setTimeout(() => {
                const assistiu = confirm("[AMBIENTE DESENVOLVIMENTO]\nDeseja simular assistir ao anúncio completo para validar o gol?");
                if(assistiu) recompensaConcedida = true;
                processarFechamentoAd();
            }, 800);
        }
    });

    function processarFechamentoAd() {
        const timeSelecionado = selectTime.value;

        if (recompensaConcedida) {
            const golRef = ref(db, `times/${timeSelecionado}/gols`);
            runTransaction(golRef, (currentGols) => {
                return (currentGols || 0) + 1;
            }).then(() => {
                alert(`⚽ GOOOL CONVALIDADO! Gol computado para o ${timeSelecionado}!`);
            }).catch(err => console.error("Fraude retida pelas regras de segurança:", err));
        } else {
            alert("❌ Chute pra fora! Você fechou a publicidade antes do tempo de validação.");
        }

        btnGol.disabled = false;
        btnGol.innerText = "⚽ Chutar pro Gol! (Ad)";
        
        // Recarrega um novo anúncio em segundo plano para o próximo clique
        if (window.googletag) {
            googletag.cmd.push(() => { googletag.pubads().refresh([rewardedSlot]); });
        }
    }

    carregarDadosDosTimes();
</script>
</body>
</html>
