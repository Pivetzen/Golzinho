<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golzinho Realtime - Arena</title>
    <script src="https://game-cdn.poki.com/ga/v2.js"></script>
    <style>
        :root { --primary-color: #2b8a3e; --gold: #fcc419; --stadium-green: #1a4324; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, var(--stadium-green) 0%, #050f07 100%); color: #fff; text-align: center; padding: 20px; min-height: 100vh; margin: 0; }
        .stadium-wrapper { max-width: 500px; margin: auto; background: rgba(20, 20, 20, 0.95); padding: 25px; border-radius: 24px; border: 3px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-kick { width: 100%; padding: 20px; font-size: 20px; font-weight: 900; background: linear-gradient(to bottom, #51cf66, #2b8a3e); color: white; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        .btn-kick:disabled { background: #444; color: #888; cursor: not-allowed; }
        #timerDisplay { font-size: 14px; margin-top: 10px; color: var(--gold); }
    </style>
</head>
<body>

<div class="stadium-wrapper">
    <h1>🏟️ Arena Golzinho</h1>
    <select id="selectTime" style="padding: 12px; width: 100%; border-radius: 8px; background: #222; color: #fff; border: 1px solid #444;">
        <option>Carregando clubes...</option>
    </select>
    
    <button class="btn-kick" id="btnGol">⚽ CHUTAR PARA O GOL</button>
    <div id="timerDisplay">Chute gratuito disponível!</div>

    <div class="scoreboard" style="margin-top: 30px; text-align: left;">
        <h3>🏆 RANKING</h3>
        <div id="dadosPlacar">Sintonizando refletores...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOmB90lBIwHCZMaUIMrqWXQb_bj5VrKyE",
        databaseURL: "https://golzinho-410ab-default-rtdb.firebaseio.com",
        projectId: "golzinho-410ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let ultimoChute = 0;
    const COOLDOWN_MS = 5 * 60 * 1000; // 5 minutos
    const btnGol = document.getElementById('btnGol');
    const timerDisplay = document.getElementById('timerDisplay');
    const selectTime = document.getElementById('selectTime');

    // Inicializa Poki SDK
    PokiSDK.init().catch(() => {});

    async function carregarTimes() {
        const response = await fetch("https://script.google.com/macros/s/AKfycbxMpYkz_6GhN02m2XqlQheQM3UbuoM7Qfuz5I-IIDELqsyE7fWgx47cCvkcyB-0s_RzRA/exec");
        const data = await response.json();
        selectTime.innerHTML = data.map(t => `<option value="${t.nome}">${t.emblema} ${t.nome}</option>`).join('');
    }

    function atualizarTimer() {
        const agora = Date.now();
        const resto = COOLDOWN_MS - (agora - ultimoChute);
        if (resto > 0) {
            const mins = Math.floor(resto / 60000);
            const secs = Math.floor((resto % 60000) / 1000);
            timerDisplay.innerText = `Próximo chute grátis em: ${mins}:${secs.toString().padStart(2, '0')}`;
            btnGol.innerText = "⚽ ASSISTIR VÍDEO E CHUTAR";
        } else {
            timerDisplay.innerText = "Chute gratuito disponível!";
            btnGol.innerText = "⚽ CHUTAR AGORA (GRÁTIS)";
        }
    }

    btnGol.addEventListener('click', async () => {
        const agora = Date.now();
        
        if (agora - ultimoChute >= COOLDOWN_MS) {
            concluirGol();
        } else {
            // Chama o anúncio recompensado da Poki
            PokiSDK.rewardedBreak().then((withReward) => {
                if (withReward) {
                    concluirGol();
                } else {
                    alert("Assista ao vídeo até o final para pontuar!");
                }
            });
        }
    });

    function concluirGol() {
        const time = selectTime.value;
        const golRef = ref(db, `times/${time}/gols`);
        runTransaction(golRef, (gols) => (gols || 0) + 1).then(() => {
            ultimoChute = Date.now();
            alert("⚽ GOL DO " + time + "!");
        });
    }

    setInterval(atualizarTimer, 1000);
    carregarTimes();
    
    // Escuta o ranking
    onValue(ref(db, 'times'), (snap) => {
        const data = snap.val();
        document.getElementById('dadosPlacar').innerHTML = Object.keys(data)
            .map(t => `<div style="padding:5px; border-bottom:1px solid #333;">${t}: <b>${data[t].gols}</b></div>`).join('');
    });
</script>
</body>
</html>
