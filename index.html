<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Golzinho Realtime - Arena</title>
    
    <style>
        :root {
            --primary-color: #2b8a3e;
            --stadium-green: #1a4324;
            --gold: #fcc419;
            --dark-card: #141414;
            --neon-green: #39ff14;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: radial-gradient(circle at center, var(--stadium-green) 0%, #050f07 100%); 
            color: #fff;
            /* Margens ajustadas para dar espaço perfeito aos banners 320x50 no celular */
            padding: 70px 15px 70px 15px; 
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Containers Fixos do Adsterra */
        .ad-banner-fixed-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .ad-banner-fixed-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #222;
        }

        /* Área restrita para evitar que o anúncio quebre o layout mobile */
        .adsterra-placement {
            width: 320px;
            height: 50px;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .adsterra-placement iframe {
            width: 320px !important;
            height: 50px !important;
            border: none !important;
            overflow: hidden !important;
        }

        .stadium-wrapper {
            max-width: 550px; 
            margin: 0 auto; 
            background: rgba(20, 20, 20, 0.98); 
            padding: 25px; 
            border-radius: 24px; 
            border: 3px solid #2d2d2d;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(43, 138, 62, 0.15); 
        }

        h1 { 
            font-size: 28px; 
            color: var(--gold); 
            margin-bottom: 5px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.9);
        }
        .subtitle { font-size: 13px; color: #a0a0a0; margin-bottom: 25px; font-style: italic; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 6px; letter-spacing: 1px; }
        
        select { 
            width: 100%; padding: 15px; font-size: 16px; font-weight: 600;
            background: #1e1e1e; color: #fff; border: 2px solid #333; border-radius: 10px;
            cursor: pointer; transition: all 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        select:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 10px rgba(43,138,62,0.5); }

        /* Filtros de Regiões */
        .filter-container { display: flex; justify-content: space-between; gap: 6px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .filter-btn { 
            flex: 1; min-width: 75px; padding: 10px 2px; font-size: 11px; font-weight: 800; background: #262626; 
            border: 1px solid #3a3a3a; border-radius: 6px; color: #aaa; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s;
        }
        .filter-btn:hover { color: #fff; background: #333; }
        .filter-btn.active { background: var(--primary-color); border-color: #51cf66; color: #fff; box-shadow: 0 0 8px rgba(43,138,62,0.6); }

        /* Botão Chutar Principal */
        .btn-kick { 
            width: 100%; padding: 20px; font-size: 22px; font-weight: 900; 
            background: linear-gradient(to bottom, #51cf66 0%, #2b8a3e 100%);
            color: white; border: none; border-radius: 14px; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 6px 0 #1c5c29, 0 12px 20px rgba(0,0,0,0.5); transition: all 0.1s;
            text-shadow: 0 2px 2px rgba(0,0,0,0.6);
        }
        .btn-kick:not(:disabled):hover { background: linear-gradient(to bottom, #5cdd72 0%, #329e48 100%); }
        .btn-kick:active { transform: translateY(4px); box-shadow: 0 2px 0 #1c5c29, 0 4px 10px rgba(0,0,0,0.5); }
        .btn-kick:disabled { background: #333 !important; box-shadow: none !important; cursor: not-allowed; opacity: 0.6; color: #fff; transform: none; }

        /* Placar Retro-LED */
        .scoreboard { 
            margin-top: 30px; background: #080808; border: 4px solid #222; 
            border-radius: 16px; padding: 20px; text-align: left;
            box-shadow: inset 0 0 15px rgba(0,0,0,1), 0 4px 10px rgba(0,0,0,0.5);
        }
        .scoreboard h3 { 
            margin-top: 0; color: #fff; border-bottom: 2px solid #1a1a1a; 
            padding-bottom: 10px; font-size: 15px; letter-spacing: 1px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .live-indicator { font-size: 10px; background: #e03131; padding: 3px 7px; border-radius: 4px; color: #fff; animation: blink 1.5s infinite; font-family: sans-serif; font-weight: 900; }
        
        #dadosPlacar { font-family: 'Courier New', Courier, monospace; }

        .row-team { 
            display: flex; justify-content: space-between; padding: 12px 5px; 
            border-bottom: 1px dashed #1f1f1f; align-items: center; font-size: 16px;
            animation: fadeIn 0.3s ease-in;
        }
        .row-team:last-child { border: none; }
        .team-meta { display: flex; align-items: center; }
        .emblem { font-size: 22px; margin-right: 12px; display: inline-block; width: 32px; text-align: center; }
        .emblem img { width: 30px; height: 30px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .state-badge { background: #222; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 10px; color: #aaa; border: 1px solid #333; }
        .goals-counter { color: var(--neon-green); font-weight: bold; font-size: 18px; text-shadow: 0 0 6px rgba(57, 255, 20, 0.5); }

        /* Modal customizado */
        .rewarded-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.96);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
        }
        .rewarded-content {
            background: #111;
            padding: 20px 15px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            width: 100%;
            max-width: 380px;
            box-shadow: 0 0 30px rgba(252, 196, 25, 0.2);
            text-align: center;
            box-sizing: border-box;
        }
        .rewarded-title {
            color: var(--gold);
            font-size: 16px;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .ad-frame-container {
            width: 100%;
            height: 280px;
            background: #000;
            border-radius: 10px;
            border: 1px solid #222;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .ad-frame-container iframe { max-width: 100%; height: 280px; border: none; display: block; margin: 0 auto; }
        .rewarded-timer { font-size: 26px; color: var(--neon-green); font-weight: bold; margin: 8px 0; text-shadow: 0 0 10px rgba(57, 255, 20, 0.4); }
        .rewarded-status { font-size: 12px; color: #aaa; margin-bottom: 5px; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="ad-banner-fixed-top">
    <div class="adsterra-placement" id="bannerTopContainer"></div>
</div>

<div class="ad-banner-fixed-bottom">
    <div class="adsterra-placement" id="bannerBottomContainer"></div>
</div>

<div id="rewardedModal" class="rewarded-modal">
    <div class="rewarded-content">
        <div class="rewarded-title">📺 Transmissão da Rodada</div>
        
        <div class="ad-frame-container" id="adFrameContainer">
            <div style="color: #444; font-size: 13px;">Carregando player de vídeo...</div>
        </div>

        <div class="rewarded-status" id="rewardedStatus">Aguarde o término para validar seu gol!</div>
        <div class="rewarded-timer" id="rewardedTimer">15s</div>
        <div style="font-size: 10px; color: #cc3333; font-weight: bold; margin-top: 5px;">⚠️ Não feche ou mude de aba para não pausar a validação.</div>
    </div>
</div>

<div class="stadium-wrapper">
    <h1>🏟️ Arena Golzinho</h1>
    <div class="subtitle">Escolha seu clube e marque gols assistindo à rodada!</div>
    
    <div class="form-group">
        <label>Selecione seu Time:</label>
        <select id="selectTime">
            <option value="">Carregando clubes parceiros...</option>
        </select>
    </div>

    <button class="btn-kick" id="btnGol" disabled>⚽ Chutar pro Gol!</button>

    <div class="scoreboard">
        <h3>
            <span>🏆 RANKING NACIONAL GERAL</span>
            <span class="live-indicator">● LIVE</span>
        </h3>
        
        <label style="margin-bottom: 8px;">Filtrar Placar por Região:</label>
        <div class="filter-container">
            <button class="filter-btn active" onclick="filtrarRegiao('todos')">TODOS</button>
            <button class="filter-btn" onclick="filtrarRegiao('nordeste')">NORDESTE</button>
            <button class="filter-btn" onclick="filtrarRegiao('sudeste')">SUDESTE</button>
            <button class="filter-btn" onclick="filtrarRegiao('sul')">SUL</button>
            <button class="filter-btn" onclick="filtrarRegiao('centro-oeste')">CENTRO-OESTE</button>
            <button class="filter-btn" onclick="filtrarRegiao('norte')">NORTE</button>
        </div>

        <div id="dadosPlacar">Sintonizando refletores da arena...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app-check.js";

    const URL_PLANILHA_API = "https://script.google.com/macros/s/AKfycbxMpYkz_6GhN02m2XqlQheQM3UbuoM7Qfuz5I-IIDELqsyE7fWgx47cCvkcyB-0s_RzRA/exec";

    const firebaseConfig = {
        apiKey: "AIzaSyBOmB90lBIwHCZMaUIMrqWXQb_bj5VrKyE",
        authDomain: "golzinho-410ab.firebaseapp.com",
        databaseURL: "https://golzinho-410ab-default-rtdb.firebaseio.com",
        projectId: "golzinho-410ab",
        storageBucket: "golzinho-410ab.firebasestorage.app",
        messagingSenderId: "685138662724",
        appId: "1:685138662724:web:760dabe9dc52fed8c1b311"
    };

    const app = initializeApp(firebaseConfig);

    try {
        const appCheck = initializeAppCheck(app, {
            provider: new ReCaptchaV3Provider('SUA_CHAVE_RECAPTCHA_AQUI'),
            isTokenAutoRefreshEnabled: true
        });
    } catch (error) {
        console.warn("App Check suspenso em ambiente local.");
    }

    const db = getDatabase(app);

    const btnGol = document.getElementById('btnGol');
    const selectTime = document.getElementById('selectTime');
    const dadosPlacar = document.getElementById('dadosPlacar');
    
    const rewardedModal = document.getElementById('rewardedModal');
    const adFrameContainer = document.getElementById('adFrameContainer');
    const rewardedTimer = document.getElementById('rewardedTimer');
    const rewardedStatus = document.getElementById('rewardedStatus');

    let dbDataCache = {}; 
    let mapaTimes = {}; 
    let regiaoAtual = 'todos';

    // 🔗 CONFIGURAÇÃO DO REWARDED (A-ADS):
    const SRC_DO_IFRAME_AADS = "https://ad.a-ads.com/2445568?size=336x280"; 
    const TEMPO_RECOMPENSA_SEGUNDOS = 15; 

    // 🔗 LOGICA EXCLUSIVA PARA CARREGAMENTO E ROTAÇÃO DO SCRIPT ADSTERRA
    function renderizarScriptAdsterra(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        // Criamos um iframe em branco e injetamos o script dinamicamente dentro dele
        // Isso isola as variáveis "atOptions" e impede bugs de duplicação do Adsterra
        container.innerHTML = ""; 
        const iframe = document.createElement("iframe");
        iframe.style.width = "320px";
        iframe.style.height = "50px";
        iframe.style.border = "none";
        iframe.style.scrolling = "no";
        container.appendChild(iframe);

        const doc = iframe.contentWindow.document || iframe.contentDocument;
        doc.open();
        doc.write(`
            <html style="margin:0;padding:0;overflow:hidden;">
            <body style="margin:0;padding:0;overflow:hidden;background:transparent;">
                <script>
                    var atOptions = {
                        'key' : 'f95477b41aad412b789767be6416723b',
                        'format' : 'iframe',
                        'height' : 50,
                        'width' : 320,
                        'params' : {}
                    };
                <\/script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/f95477b41aad412b789767be6416723b/invoke.js"><\/script>
            </body>
            </html>
        `);
        doc.close();
    }

    // Função que gerencia o loop de atualização a cada 15 segundos
    function gerenciarLoopBanners() {
        renderizarScriptAdsterra("bannerTopContainer");
        renderizarScriptAdsterra("bannerBottomContainer");
    }

    // Define o intervalo constante para alternar/atualizar as campanhas do Adsterra (15000 milissegundos)
    setInterval(gerenciarLoopBanners, 15000);

    async function carregarDadosDosTimes() {
        try {
            const response = await fetch(URL_PLANILHA_API);
            const times = await response.json();
            
            selectTime.innerHTML = '<option value="">-- Selecione seu Clube --</option>';
            
            times.forEach(t => {
                mapaTimes[t.nome.trim()] = t; 
                
                const option = document.createElement('option');
                option.value = t.nome.trim();
                option.textContent = `${t.emblema} ${t.nome} (${t.estado.toUpperCase()})`;
                selectTime.appendChild(option);
            });

            btnGol.disabled = false;
        } catch (error) {
            console.error("Erro ao sincronizar com o Sheets:", error);
            dadosPlacar.innerText = "Erro ao sincronizar dados da liga.";
        }
    }

    function exibirEmblema(emblema) {
        if (!emblema) return '⚽';
        if (emblema.startsWith('http')) return `<img src="${emblema}" alt="Escudo">`;
        return `<span>${emblema}</span>`;
    }

    function ouvirPlacarRealtime() {
        const timesRef = ref(db, 'times');
        onValue(timesRef, (snapshot) => {
            dbDataCache = snapshot.val() || {};
            renderizarPlacar();
        });
    }

    function renderizarPlacar() {
        if (!dbDataCache || Object.keys(dbDataCache).length === 0) {
            dadosPlacar.innerHTML = '<div style="color:#666; padding:10px;">Nenhum gol registrado nesta região.</div>';
            return;
        }

        dadosPlacar.innerHTML = '';
        const timesFiltrados = Object.keys(dbDataCache).filter(nomeTime => {
            const infoSheets = mapaTimes[nomeTime.trim()];
            if (!infoSheets) return regiaoAtual === 'todos'; 
            if (regiaoAtual === 'todos') return true;
            return String(infoSheets.regiao).toLowerCase().trim() === String(regiaoAtual).toLowerCase().trim();
        });

        if (timesFiltrados.length === 0) {
            dadosPlacar.innerHTML = `<div style="color:#555; padding:10px;">Nenhum gol em ${regiaoAtual.toUpperCase()}.</div>`;
            return;
        }

        timesFiltrados
            .sort((a, b) => (dbDataCache[b].gols || 0) - (dbDataCache[a].gols || 0))
            .forEach(nomeTime => {
                const info = mapaTimes[nomeTime.trim()] || { emblema: '⚽', estado: '??' };
                dadosPlacar.innerHTML += `
                    <div class="row-team">
                        <div class="team-meta">
                            <div class="emblem">${exibirEmblema(info.emblema)}</div>
                            <strong>${nomeTime}</strong>
                            <span class="state-badge">${info.estado.toUpperCase()}</span>
                        </div>
                        <span class="goals-counter">${dbDataCache[nomeTime].gols || 0} GOLS</span>
                    </div>
                `;
            });
    }

    window.filtrarRegiao = function(regiao) {
        regiaoAtual = regiao;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        if (event && event.target) event.target.classList.add('active');
        renderizarPlacar();
    };

    let cronometroRewarded;
    let tempoRestanteRewarded = 0;
    let timePendenteRecompensa = "";

    btnGol.addEventListener('click', () => {
        const timeSelecionado = selectTime.value;
        if (!timeSelecionado) {
            alert("Selecione um time para chutar!");
            return;
        }

        timePendenteRecompensa = timeSelecionado;
        tempoRestanteRewarded = TEMPO_RECOMPENSA_SEGUNDOS;

        adFrameContainer.innerHTML = `<iframe src="${SRC_DO_IFRAME_AADS}" width="336" height="280" scrolling="no" allowtransparency="true"></iframe>`;

        btnGol.disabled = true;
        rewardedModal.style.display = 'flex';
        rewardedTimer.innerText = `${tempoRestanteRewarded}s`;
        rewardedStatus.innerText = "Validando reprodução em tela...";
        rewardedStatus.style.color = "#aaa";

        iniciarContagemRewarded();
    });

    function iniciarContagemRewarded() {
        clearInterval(cronometroRewarded);
        cronometroRewarded = setInterval(() => {
            if (document.hidden) {
                rewardedStatus.innerText = "⏸️ Transmissão pausada! Volte para a tela da Arena.";
                rewardedStatus.style.color = "#e03131";
                return; 
            }

            rewardedStatus.innerText = "Acompanhando partida ativa...";
            rewardedStatus.style.color = "#51cf66";
            tempoRestanteRewarded--;

            if (tempoRestanteRewarded > 0) {
                rewardedTimer.innerText = `${tempoRestanteRewarded}s`;
            } else {
                clearInterval(cronometroRewarded);
                rewardedModal.style.display = 'none';
                adFrameContainer.innerHTML = ""; 
                concluirGolRewarded();
            }
        }, 1000);
    }

    function concluirGolRewarded() {
        if (!timePendenteRecompensa) return;

        const golRef = ref(db, `times/${timePendenteRecompensa}/gols`);
        
        runTransaction(golRef, (currentGols) => {
            return (currentGols || 0) + 1;
        }).then(() => {
            alert(`🏆 GOL CONFIRMADO! Você assistiu à transmissão e o ponto do ${timePendenteRecompensa} foi computado.`);
            restaurarBotaoChute();
        }).catch(err => {
            console.error("Transação barrada:", err);
            restaurarBotaoChute();
        });
    }

    function restaurarBotaoChute() {
        timePendenteRecompensa = "";
        btnGol.disabled = false;
        btnGol.innerText = "⚽ Chutar pro Gol!";
    }

    carregarDadosDosTimes().then(() => {
        ouvirPlacarRealtime();
        gerenciarLoopBanners(); // Roda os banners do Adsterra imediatamente ao abrir o app
    });
</script>
</body>
</html>
